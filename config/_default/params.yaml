# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# Appearance
appearance:
  theme_day: bbl
  theme_night: bbl
  font: classic
  font_size: L
# SEO
marketing:
  seo:
    site_type: Organization
    local_business_type: ''
    org_name: 'Brain, Behavior, and Learning Lab'
    description: 'The Brain, Behavior, and Learning (BBL) Lab studies the cognitive and neural mechanisms of children''s learning and development, with a focus on mathematical cognition, reasoning, and educational neuroscience. Based at the Lyon Neuroscience Research Center (CRNL), France.'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    google_tag_manager: ''
    microsoft_clarity: ''
  verification:
    google: ''
    baidu: ''
# Site header
header:
  navbar:
    enable: true
    align: r
    show_logo: true
    show_language: false
    show_day_night: false
    show_search: true
    highlight_active_link: true
# Site footer
footer:
  copyright:
    notice: '© {year} Brain, Behavior, and Learning Lab. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false
# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'
  address_format: en-us
# Site features
features:
  syntax_highlighter:
    enable: false
    extra_languages:
      - r
      - latex
  math:
    enable: false
  privacy_pack:
    enable: true
  repository:
    url: 'https://github.com/BBL-lab/bbl-website'
    content_dir: content
    branch: main
  avatar:
    gravatar: false
    shape: circle
  comment:
    provider: ''
    disqus:
      shortname: ''
      show_count: true
    commento:
      url: ''
    giscus:
      repo: ''
      repo_id: ''
      category: ''
      category_id: ''
  search:
    provider: wowchemy
    algolia:
      app_id: ''
      api_key: ''
      index_name: ''
      show_logo: false
  map:
    provider: 'mapnik'
    api_key: ''
    zoom: 15
# Extensions
extensions:
  decap_cms:
    branch: main
    local_backend: false
  academicons:
    enable: true
# Citation style
publications:
  date_format: January 2006
  citation_style: apa
